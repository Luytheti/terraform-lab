name: "Terraform Check"

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  terraform:
    name: "Terraform Lint and Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Format
        run: terraform fmt -check
        # This checks if your code is 'pretty' and indented correctly

      - name: Terraform Init
        run: terraform init
        working-directory: ./day1 # We test against day1 as a starting point

      - name: Terraform Validate
        run: terraform validate
        working-directory: ./day1

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./day1
